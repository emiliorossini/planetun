apiVersion: apps/v1
kind: Deployment
metadata:
  name: meuservico
  annotations:
    kubernetes.io/change-cause: "deploy automático"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: meuservico
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: meuservico
    spec:
      containers:
      - name: meuservico
        image: meuacr.azurecr.io/meuservico:latest
        ports:
        - containerPort: 8080

        # ── Variáveis de ambiente ──────────────────────────────────────────────
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: meuservico-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ConnectionStrings__Default
          valueFrom:
            secretKeyRef:
              name: meuservico-secret
              key: connection-string
        - name: ApiKey
          valueFrom:
            secretKeyRef:
              name: meuservico-secret
              key: api-key

        # ── Resource limits ───────────────────────────────────────────────────
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

        # ── Liveness probe ────────────────────────────────────────────────────
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3

        # ── Readiness probe ───────────────────────────────────────────────────
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: meuservico-config
data:
  ASPNETCORE_ENVIRONMENT: "Production"

---
apiVersion: v1
kind: Secret
metadata:
  name: meuservico-secret
type: Opaque
stringData:
  connection-string: "Server=meubd;Database=meubanco;User=sa;Password=senha123"
  api-key: "minha-api-key-secreta"
